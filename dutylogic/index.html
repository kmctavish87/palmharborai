<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>DutyLogic</title>
    <link rel="icon" type="image/svg+xml" href="./dutylogic-logo.svg" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #0f172a;
      }

      .boot-card {
        max-width: 720px;
        width: 100%;
        padding: 20px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 12px 35px rgba(15, 23, 42, 0.08);
      }

      .boot-card h1 {
        margin: 0 0 8px;
        font-size: 1.2rem;
      }

      .boot-card p,
      .boot-card pre {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .boot-card pre {
        margin-top: 12px;
        color: #991b1b;
      }
    </style>
    <script>
      function showBootError(title, details) {
        var root = document.getElementById("root");
        if (!root) return;
        root.innerHTML =
          '<div class="boot-shell"><div class="boot-card"><h1>' +
          title +
          '</h1><pre>' +
          String(details || "Unknown error") +
          "</pre></div></div>";
      }

      window.addEventListener("error", function (event) {
        showBootError("Browser error while loading the app", event.error?.stack || event.message);
      });

      window.addEventListener("unhandledrejection", function (event) {
        var reason = event.reason;
        showBootError(
          "Unhandled promise rejection while loading the app",
          reason?.stack || reason?.message || String(reason),
        );
      });
    </script>
    <script type="module" crossorigin src="./assets/index-4Nr_St2-.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CKcNUOrH.css">
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-card">
          <h1>Loading DutyLogic...</h1>
          <p>The page is starting up. If something fails, the error will appear here.</p>
        </div>
      </div>
    </div>
  </body>
</html>
